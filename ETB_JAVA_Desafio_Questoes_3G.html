        function changeFontSize(level) {
            currentFontSizeLevel = level;
            localStorage.setItem('fontSizeLevel', level);

            const root = document.documentElement;
            const btnDec = document.getElementById('font-btn-dec');
            const btnNorm = document.getElementById('font-btn-norm');
            const btnInc = document.getElementById('font-btn-inc');

            if (!btnDec || !btnNorm || !btnInc) return;

            // Reset classes
            btnDec.className = "px-2.5 py-1 text-xs font-bold text-slate-500 hover:text-slate-800 dark:text-slate-400 dark:hover:text-white transition-colors";
            btnNorm.className = "px-2.5 py-1 text-xs font-bold text-slate-500 hover:text-slate-800 dark:text-slate-400 dark:hover:text-white border-l border-r border-slate-300 dark:border-slate-600 transition-colors";
            btnInc.className = "px-2.5 py-1 text-xs font-bold text-slate-500 hover:text-slate-800 dark:text-slate-400 dark:hover:text-white transition-colors";

            if (level === -1) {
                root.style.fontSize = '14px';
                btnDec.className = "px-2.5 py-1 text-xs font-bold text-emerald-600 dark:text-emerald-400 transition-colors";
            } else if (level === 1) {
                root.style.fontSize = '18px';
                btnInc.className = "px-2.5 py-1 text-xs font-bold text-emerald-600 dark:text-emerald-400 transition-colors";
            } else {
                root.style.fontSize = '16px';
                btnNorm.className = "px-2.5 py-1 text-xs font-bold text-emerald-600 dark:text-emerald-400 border-l border-r border-slate-300 dark:border-slate-600 transition-colors";
            }
        }

        const DOM = {
            html: document.documentElement,
            themeToggle: document.getElementById('theme-toggle'),
            themeIcon: document.getElementById('theme-icon'),
            slideCounter: document.getElementById('slide-counter'),
            progressBar: document.getElementById('progress-bar'),
            iconContainer: document.getElementById('slide-icon-container'),
            title: document.getElementById('slide-title'),
            contentContainer: document.getElementById('slide-content-container'),
            answerSection: document.getElementById('answer-section'),
            btnReveal: document.getElementById('btn-reveal'),
            answerFeedback: document.getElementById('answer-feedback'),
            answerText: document.getElementById('answer-text'),
            btnPrev: document.getElementById('btn-prev'),
            btnNext: document.getElementById('btn-next'),
            dotsContainer: document.getElementById('dots-container'),
            sidebarNav: document.getElementById('sidebar-nav')
        };

        function updateTheme() {
            if (isDarkMode) {
                DOM.html.classList.add('dark');
                DOM.themeIcon.innerHTML = icons.sun;
            } else {
                DOM.html.classList.remove('dark');
                DOM.themeIcon.innerHTML = icons.moon;
            }
        }

        DOM.themeToggle.addEventListener('click', () => {
            isDarkMode = !isDarkMode;
            updateTheme();
        });

        // --- CONTROLE DA SIDEBAR E MARGEM NEGATIVA ---
        const sidebar = document.getElementById('sidebar');
        const sidebarToggle = document.getElementById('sidebar-toggle');
        const sidebarOverlay = document.getElementById('sidebar-overlay');
        let isSidebarOpen = window.innerWidth >= 768;

        function updateSidebarState() {
            if (isSidebarOpen) {
                sidebar.classList.remove('-translate-x-full', 'md:-ml-72');
                sidebarOverlay.classList.remove('hidden');
            } else {
                sidebar.classList.add('-translate-x-full', 'md:-ml-72');
                sidebarOverlay.classList.add('hidden');
            }
        }

        sidebarToggle.addEventListener('click', () => {
            isSidebarOpen = !isSidebarOpen;
            updateSidebarState();
        });

        sidebarOverlay.addEventListener('click', () => {
            if (window.innerWidth < 768) {
                isSidebarOpen = false;
                updateSidebarState();
            }
        });

        function populateSidebar() {
            DOM.sidebarNav.innerHTML = '';
            slidesData.forEach((slide, index) => {
                const li = document.createElement('li');
                li.className = `p-3 rounded-lg cursor-pointer transition-all border-l-4 text-sm font-medium ${index === currentSlide
                    ? 'bg-emerald-50 dark:bg-emerald-900/20 border-emerald-500 text-emerald-700 dark:text-emerald-400'
                    : 'border-transparent text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800'
                    }`;
                li.innerHTML = `<div class="flex items-center gap-3">
                                   <div class="scale-75 opacity-70">${slide.icon}</div>
                                   <span class="truncate">${slide.title}</span>
                                </div>`;
                li.addEventListener('click', () => {
                    currentSlide = index;
                    renderSlide();
                    if (window.innerWidth < 768) {
                        isSidebarOpen = false;
                        updateSidebarState();
                    }
                });
                DOM.sidebarNav.appendChild(li);
            });
        }

        function renderSlide() {
            const slide = slidesData[currentSlide];

            DOM.contentContainer.classList.remove('slide-transition');
            void DOM.contentContainer.offsetWidth;
            DOM.contentContainer.classList.add('slide-transition');

            DOM.iconContainer.innerHTML = slide.icon;
            DOM.title.textContent = slide.title;
            DOM.contentContainer.innerHTML = slide.content;

            const progress = ((currentSlide + 1) / slidesData.length) * 100;
            DOM.progressBar.style.width = `${progress}%`;
            DOM.slideCounter.textContent = `SLIDE ${currentSlide + 1} / ${slidesData.length}`;

            if (slide.isQuestion) {
                DOM.answerSection.classList.remove('hidden');
                DOM.btnReveal.classList.remove('hidden');
                DOM.answerFeedback.classList.add('hidden');

                DOM.answerText.innerHTML = slide.answer;

                DOM.btnReveal.innerHTML = `
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="mr-1">
                        <polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/>
                    </svg> Revelar Solução`;
            } else {
                DOM.answerSection.classList.add('hidden');
            }

            DOM.btnPrev.disabled = currentSlide === 0;
            DOM.btnPrev.style.opacity = currentSlide === 0 ? '0.3' : '1';
            DOM.btnNext.disabled = currentSlide === slidesData.length - 1;
            DOM.btnNext.style.opacity = currentSlide === slidesData.length - 1 ? '0.3' : '1';

            renderDots();
            populateSidebar();
        }

        function renderDots() {
            DOM.dotsContainer.innerHTML = '';
            slidesData.forEach((_, index) => {
                const dot = document.createElement('button');
                dot.className = `w-2 h-2 rounded-full transition-all ${index === currentSlide ? 'w-6 bg-emerald-500' : 'bg-slate-300 dark:bg-slate-600 hover:bg-slate-400 dark:hover:bg-slate-500'}`;
                dot.addEventListener('click', () => {
                    currentSlide = index;
                    renderSlide();
                });
                DOM.dotsContainer.appendChild(dot);
            });
        }

        DOM.btnPrev.addEventListener('click', () => {
            if (currentSlide > 0) {
                currentSlide--;
                renderSlide();
            }
        });

        DOM.btnNext.addEventListener('click', () => {
            if (currentSlide < slidesData.length - 1) {
                currentSlide++;
                renderSlide();
            }
        });

        DOM.btnReveal.addEventListener('click', () => {
            DOM.answerFeedback.classList.remove('hidden');
            DOM.btnReveal.classList.add('hidden');

            // Re-aplicar a animação para o feedback
            DOM.answerFeedback.classList.remove('slide-transition');
            void DOM.answerFeedback.offsetWidth;
            DOM.answerFeedback.classList.add('slide-transition');
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight' && currentSlide < slidesData.length - 1) {
                currentSlide++;
                renderSlide();
            } else if (e.key === 'ArrowLeft' && currentSlide > 0) {
                currentSlide--;
                renderSlide();
            }
        });

        // Initialize
        updateTheme();
        renderSlide();
        updateSidebarState();

        // Responsive handling on resize
        window.addEventListener('resize', () => {
            if (window.innerWidth >= 768) {
                if (!isSidebarOpen) {
                    isSidebarOpen = true;
                    updateSidebarState();
                }
            } else {
                if (isSidebarOpen) {
                    isSidebarOpen = false;
                    updateSidebarState();
                }
            }
        });

    </script>
</body>

</html>
