                DOM.answerFeedback.classList.add('hidden');

                DOM.answerText.innerHTML = slide.answer;

                DOM.btnReveal.className = "w-full md:w-auto px-6 py-4 border-2 border-dashed border-emerald-500 text-emerald-600 dark:text-emerald-400 hover:bg-emerald-500 hover:text-white dark:hover:text-slate-900 font-bold rounded-xl transition-colors flex justify-center items-center gap-2 text-sm uppercase tracking-wider shrink-0";
                DOM.btnReveal.innerHTML = `
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="mr-1">
                        <polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/>
                    </svg> Resolução`;
            } else {

                DOM.answerSection.classList.add('hidden');
            }

            DOM.btnPrev.disabled = currentSlide === 0;
            DOM.btnPrev.style.opacity = currentSlide === 0 ? '0.3' : '1';
            DOM.btnNext.disabled = currentSlide === slidesData.length - 1;
            DOM.btnNext.style.opacity = currentSlide === slidesData.length - 1 ? '0.3' : '1';

            renderDots();
            populateSidebar();
        }

        function toggleAnswer(id) {
            const answerDiv = document.getElementById('ans-' + id);
            if (answerDiv) {
                if (answerDiv.classList.contains('hidden')) {
                    answerDiv.classList.remove('hidden');
                    answerDiv.classList.add('slide-transition');
                } else {
                    answerDiv.classList.add('hidden');
                    answerDiv.classList.remove('slide-transition');
                }
            }
        }

        function renderDots() {
            DOM.dotsContainer.innerHTML = '';
            slidesData.forEach((_, index) => {
                const dot = document.createElement('button');
                dot.className = `w-2 h-2 rounded-full transition-all ${index === currentSlide ? 'w-6 bg-emerald-500' : 'bg-slate-300 dark:bg-slate-600 hover:bg-slate-400 dark:hover:bg-slate-500'}`;
                dot.addEventListener('click', () => {
                    currentSlide = index;
                    renderSlide();
                });
                DOM.dotsContainer.appendChild(dot);
            });
        }

        DOM.btnPrev.addEventListener('click', () => {
            if (currentSlide > 0) {
                currentSlide--;
                renderSlide();
            }
        });

        DOM.btnNext.addEventListener('click', () => {
            if (currentSlide < slidesData.length - 1) {
                currentSlide++;
                renderSlide();
            }
        });

        DOM.btnReveal.addEventListener('click', () => {
            DOM.answerFeedback.classList.remove('hidden');
            DOM.btnReveal.classList.add('hidden');

            // Re-aplicar a animação para o feedback
            DOM.answerFeedback.classList.remove('slide-transition');
            void DOM.answerFeedback.offsetWidth;
            DOM.answerFeedback.classList.add('slide-transition');
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight' && currentSlide < slidesData.length - 1) {
                currentSlide++;
                renderSlide();
            } else if (e.key === 'ArrowLeft' && currentSlide > 0) {
                currentSlide--;
                renderSlide();
            }
        });

        // --- CONTROLE DO CRONÔMETRO ---
        let timerInterval;
        let totalSeconds = 0;
        let isTimerRunning = false;
        const timerDisplay = document.getElementById('timer-display');
        const timerContainer = document.getElementById('class-timer');

        function updateTimerDisplay() {
            const h = Math.floor(totalSeconds / 3600).toString().padStart(2, '0');
            const m = Math.floor((totalSeconds % 3600) / 60).toString().padStart(2, '0');
            const s = (totalSeconds % 60).toString().padStart(2, '0');
            if (timerDisplay) timerDisplay.textContent = `${h}:${m}:${s}`;
        }

        if (timerContainer) {
            timerContainer.addEventListener('click', () => {
                if (isTimerRunning) {
                    clearInterval(timerInterval);
                    timerContainer.classList.remove('text-emerald-400', 'border-emerald-500/50');
                    timerContainer.classList.add('text-amber-400', 'border-amber-500/50');
                } else {
                    timerContainer.classList.remove('text-amber-400', 'border-amber-500/50');
                    timerContainer.classList.add('text-emerald-400', 'border-emerald-500/50');
                    timerInterval = setInterval(() => { totalSeconds++; updateTimerDisplay(); }, 1000);
                }
                isTimerRunning = !isTimerRunning;
            });

            timerContainer.addEventListener('dblclick', () => {
                clearInterval(timerInterval);
                totalSeconds = 0;
                isTimerRunning = false;
                updateTimerDisplay();
                timerContainer.classList.remove('text-amber-400', 'border-amber-500/50');
                timerContainer.classList.add('text-emerald-400', 'border-emerald-500/50');
            });
        }

        // Initialize
        updateTheme();
        renderSlide();
        updateSidebarState();

        // Responsive handling on resize
        window.addEventListener('resize', () => {
            if (window.innerWidth >= 768) {
                if (!isSidebarOpen) {
                    isSidebarOpen = true;
                    updateSidebarState();
                }
            } else {
                if (isSidebarOpen) {
                    isSidebarOpen = false;
                    updateSidebarState();
                }
            }
        });

    </script>
</body>

</html>
