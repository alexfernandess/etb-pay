<!DOCTYPE html>
<html lang="pt-BR" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ETB-PAY | Normalização de Dados</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'],
                        mono: ['Consolas', 'Monaco', 'monospace'],
                    },
                    colors: {
                        navy: { 800: '#111827', 900: '#0F172A' },
                        cyan: { 400: '#22D3EE', 500: '#06B6D4' },
                        emerald: { 400: '#34d399', 500: '#10b981' }
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #0F172A;
            color: #CBD5E1;
            background-image:
                radial-gradient(circle at top right, rgba(6, 182, 212, 0.05), transparent 40%),
                radial-gradient(circle at bottom left, rgba(16, 185, 129, 0.05), transparent 40%);
            overflow-x: hidden;
        }

        .glass {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background-color: #334155;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background-color: #475569;
        }

        .slide-enter {
            animation: slideIn 0.4s ease-out forwards;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .reveal-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.5s ease-in-out, opacity 0.5s ease-in-out, padding 0.5s ease-in-out;
            opacity: 0;
        }

        .reveal-content.active {
            max-height: 500px;
            opacity: 1;
            padding-top: 1rem;
            padding-bottom: 1rem;
        }
    </style>
</head>

<body class="min-h-screen flex flex-col font-sans antialiased selection:bg-cyan-500/30 selection:text-cyan-200">

    <header class="glass sticky top-0 z-50 px-6 py-4 border-b border-slate-700/50">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div
                    class="w-10 h-10 rounded-xl bg-gradient-to-br from-cyan-500 to-emerald-600 flex items-center justify-center shadow-[0_0_15px_rgba(6,182,212,0.3)]">
                    <i class="ph-bold ph-database text-white text-xl"></i>
                </div>
                <div>
                    <h1 class="text-xl font-bold tracking-tight text-white">ETB-PAY</h1>
                    <p class="text-xs text-cyan-400 font-medium tracking-wider uppercase">Framework de Governança
                        Digital</p>
                </div>
            </div>
            <div class="hidden md:flex items-center gap-3 text-sm font-mono text-slate-400">
                <a href="ETB_BANCO_Operacao_Bacen.html" class="flex items-center gap-2 bg-slate-800 text-cyan-400 border border-cyan-500/30 px-3 py-1 rounded-full hover:bg-slate-700 transition">
                    <i class="ph-bold ph-arrow-u-up-left"></i> Voltar ao QG
                </a>
                <span class="bg-slate-800 border border-slate-600 px-3 py-1 rounded-full"><i
                        class="ph-bold ph-users mr-1"></i> Squad DBAs</span>
            </div>
        </div>
    </header>

    <main class="flex-1 w-full max-w-4xl mx-auto p-6 flex flex-col justify-center">
        <div id="slide-container" class="w-full relative min-h-[500px]">
        </div>

        <div class="mt-8 flex flex-col items-center gap-6">
            <div id="dots-container" class="flex gap-2">
            </div>

            <div class="flex justify-between w-full max-w-sm">
                <button id="btn-prev"
                    class="w-12 h-12 rounded-full glass flex items-center justify-center text-white hover:bg-slate-700 transition active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed">
                    <i class="ph-bold ph-caret-left text-xl"></i>
                </button>
                <button id="btn-next"
                    class="w-12 h-12 rounded-full glass flex items-center justify-center text-white hover:bg-cyan-500/20 hover:border-cyan-500/50 transition active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed">
                    <i class="ph-bold ph-caret-right text-xl"></i>
                </button>
            </div>
        </div>
    </main>

    <footer class="py-6 text-center text-slate-500 text-xs font-mono border-t border-slate-800 mt-auto">
        ETB-PAY &copy; 2026 | Arquitetura Relacional & Soft Skills Integradas
    </footer>

    <script>
        const slidesData = [
            {
                title: "Base Teórica da Normalização",
                icon: "ph-books",
                color: "text-amber-400",
                content: `
                    <p class="mb-4 text-lg leading-relaxed text-slate-300">
                        A <strong>Normalização de Dados</strong> é uma técnica essencial de design de banco de dados relacional. Ela fornece um conjunto de regras (Formas Normais) para organizar as estruturas de tabelas de forma lógica e eficiente.
                    </p>
                    <p class="mb-4 text-lg leading-relaxed text-slate-300">
                        O nosso objetivo ao aplicar essa técnica no ETB-PAY é duplo: <em>eliminar a redundância de dados</em> (dados repetidos que desperdiçam armazenamento) e <em>proteger a integridade</em> do sistema, evitando as <strong>Anomalias de Inserção, Atualização e Exclusão</strong>. Ela é a única ferramenta capaz de salvar nossa arquitetura!
                    </p>
                `,
                challenge: "Por que uma tabela não normalizada sofre de 'Anomalia de Atualização'?",
                solution: "Porque se uma informação redundante precisar ser alterada (ex: o endereço de um cliente), você terá que encontrar e atualizar todas as linhas onde essa informação se repete. Se esquecer uma linha, a base de dados perde a integridade."
            },
            {
                title: "1ª Forma Normal (1FN): Atomicidade",
                icon: "ph-scissors",
                color: "text-cyan-400",
                content: `
                    <p class="mb-4 text-lg leading-relaxed text-slate-300">
                        A regra fundamental da <code>1FN</code> é a <strong>Atomicidade</strong>: Cada coluna de uma tabela deve conter apenas valores atômicos (indivisíveis).
                    </p>
                    <ul class="space-y-3 mb-4 text-slate-300 list-disc pl-5 marker:text-cyan-500">
                        <li><strong>Fim dos Atributos Multivalorados:</strong> Na nossa planilha, tínhamos telefones como <em>(61) 9999-1111, 3333-2222</em> numa mesma célula. Isso é proibido! Cada telefone precisa estar em uma linha própria numa tabela separada.</li>
                        <li><strong>Fim dos Atributos Compostos:</strong> O endereço do cliente não pode ser um texto longo. Ele deve ser decomposto em partes menores: <code>Logradouro</code>, <code>Numero</code>, <code>Bairro</code> e <code>UF</code>.</li>
                    </ul>
                `,
                challenge: "Como a 1FN resolve o problema de um cliente com múltiplos telefones?",
                solution: "Criando uma nova entidade (ex: <code>tb_telefones</code>) que armazena cada número de telefone em uma linha individual, vinculando-os ao respectivo cliente através de uma Chave Estrangeira (FK)."
            },
            {
                title: "2ª Forma Normal (2FN): Dependência Total",
                icon: "ph-link",
                color: "text-emerald-400",
                content: `
                    <p class="mb-4 text-lg leading-relaxed text-slate-300">
                        Para que uma tabela alcance a <code>2FN</code>, ela já deve estar na 1FN e <strong>não possuir Dependências Parciais</strong>. Isso ocorre quando a tabela possui uma Chave Primária Composta.
                    </p>
                    <p class="mb-4 text-lg leading-relaxed text-slate-300">
                        A regra diz que todos os atributos não-chave devem depender <em>totalmente</em> da Chave Primária inteira. Se um dado depender de apenas uma parte da chave, ele está no lugar errado e deve ser movido para uma tabela própria onde ele dependa exclusivamente de sua PK.
                    </p>
                `,
                challenge: "Se a Chave de uma tabela de Vendas é (ID_Venda + ID_Produto), o 'Nome do Produto' pode estar nessa tabela?",
                solution: "Não! O 'Nome do Produto' depende apenas do <code>ID_Produto</code>, gerando uma dependência parcial. Ele deve ser retirado e colocado na sua própria tabela: <code>tb_produtos</code>."
            },
            {
                title: "3ª Forma Normal (3FN): Dependência Transitiva",
                icon: "ph-arrows-left-right",
                color: "text-purple-400",
                content: `
                    <p class="mb-4 text-lg leading-relaxed text-slate-300">
                        Uma tabela atinge a <code>3FN</code> quando está na 2FN e <strong>não contém Dependências Transitivas</strong>. Em termos simples: nenhum atributo não-chave pode depender de outro atributo não-chave.
                    </p>
                    <p class="mb-4 text-lg leading-relaxed text-slate-300">
                        Na nossa planilha de Pix, os dados do remetente (<code>Agência</code> e <code>Conta</code>) não dependem da Transação em si, mas sim do Cliente. Ou seja, eles estão "pegando carona" na tabela de transações. Essa dependência transitiva precisa ser cortada!
                    </p>
                `,
                challenge: "O que acontece se deixarmos a Agência e a Conta na tabela de Transações (Pix)?",
                solution: "Teremos redundância extrema. Os mesmos dados bancários seriam repetidos a cada Pix realizado pelo cliente, gastando armazenamento à toa e aumentando o risco de inconsistências no futuro."
            },
            {
                title: "O Desafio (Auditoria BACEN - Hands-on)",
                icon: "ph-check-circle",
                color: "text-blue-400",
                content: `
                    <p class="mb-4 text-lg leading-relaxed text-slate-300">
                        Com a teoria aplicada, projetamos a estrutura perfeita e auditável para o ETB-PAY. O modelo relacional final ficou assim:
                    </p>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-4 font-mono text-sm">
                        <div class="bg-slate-800/80 p-4 border border-slate-700 rounded shadow-inner">
                            <span class="text-emerald-400 font-bold">tb_clientes</span><br>
                            <span class="text-yellow-500">PK</span> id_cliente<br>
                            nome_completo<br>
                            logradouro, bairro, uf
                        </div>
                        <div class="bg-slate-800/80 p-4 border border-slate-700 rounded shadow-inner">
                            <span class="text-cyan-400 font-bold">tb_telefones</span><br>
                            <span class="text-yellow-500">PK</span> id_telefone<br>
                            <span class="text-purple-400">FK</span> id_cliente<br>
                            numero
                        </div>
                        <div class="bg-slate-800/80 p-4 border border-slate-700 rounded shadow-inner">
                            <span class="text-blue-400 font-bold">tb_contas</span><br>
                            <span class="text-yellow-500">PK</span> id_conta<br>
                            <span class="text-purple-400">FK</span> id_cliente<br>
                            agencia, numero_conta
                        </div>
                        <div class="bg-slate-800/80 p-4 border border-slate-700 rounded shadow-inner">
                            <span class="text-rose-400 font-bold">tb_transacoes</span><br>
                            <span class="text-yellow-500">PK</span> id_transacao<br>
                            <span class="text-purple-400">FK</span> id_conta_origem<br>
                            banco_destino, valor, data
                        </div>
                    </div>
                    
                    <div class="mt-6 border-l-4 border-emerald-500 pl-4">
                        <p class="text-lg leading-relaxed text-emerald-400 font-bold uppercase tracking-wider">
                            Agora é com vocês, Analistas!
                        </p>
                        <p class="text-slate-300">
                            Chegou a hora do desafio prático. Voltem ao QG da Operação BACEN e preparem-se para codificar o DDL desta arquitetura em SQLite.
                        </p>
                    </div>

                    <div class="mt-8 flex justify-center">
                        <a href="ETB_BANCO_Operacao_Bacen.html" class="bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 px-6 rounded-xl transition flex items-center gap-2 shadow-lg shadow-blue-500/20">
                            <i class="ph-bold ph-terminal-window text-xl"></i>
                            Validar Teoria e Iniciar Laboratório
                        </a>
                    </div>
                `,
                challenge: "No script DDL do SQLite, como garantimos que um telefone ou conta só exista se o cliente também existir?",
                solution: "Utilizando a constraint <code>FOREIGN KEY</code> apontando para a <code>tb_clientes</code>. É isso que consolida a Integridade Referencial que o BACEN exigiu da ETB-PAY!"
            }
        ];

        let currentSlide = 0;
        const container = document.getElementById('slide-container');
        const dotsContainer = document.getElementById('dots-container');
        const btnPrev = document.getElementById('btn-prev');
        const btnNext = document.getElementById('btn-next');

        function renderSlide() {
            const slide = slidesData[currentSlide];

            // Injeta o HTML do slide
            container.innerHTML = `
                <div class="glass rounded-2xl p-8 border-t-4 border-t-cyan-500 slide-enter w-full shadow-lg">
                    <h2 class="text-3xl font-bold mb-6 flex items-center gap-3 text-white">
                        <i class="ph-bold ${slide.icon} ${slide.color}"></i>
                        ${slide.title}
                    </h2>
                    
                    <div class="mb-8">
                        ${slide.content}
                    </div>

                    <div class="mt-8 border-t border-slate-700 pt-6">
                        <div class="bg-slate-800/50 border border-slate-600 rounded-xl p-5 relative overflow-hidden">
                            <div class="absolute top-0 left-0 w-1 h-full bg-amber-500"></div>
                            <h3 class="text-amber-400 font-bold text-sm uppercase tracking-wider mb-2 flex items-center gap-2">
                                <i class="ph-bold ph-lightning"></i> Desafio Rápido (Active Recall)
                            </h3>
                            <p class="text-slate-300 font-medium mb-4">${slide.challenge}</p>
                            
                            <button onclick="toggleSolution(this)" class="bg-slate-700 hover:bg-slate-600 text-white border border-slate-500 font-semibold px-4 py-2 rounded-lg transition flex items-center gap-2 text-sm">
                                Revelar Solução <i class="ph-bold ph-eye"></i>
                            </button>

                            <div class="reveal-content mt-0 bg-slate-900/80 rounded-lg px-4 border border-slate-700/50">
                                <p class="text-emerald-400 font-medium text-sm leading-relaxed"><i class="ph-bold ph-check-circle mr-1"></i> ${slide.solution}</p>
                            </div>
                        </div>
                    </div>
                </div>
            `;

            updateControls();
        }

        // Função global para o botão de Revelar Solução
        window.toggleSolution = function (btn) {
            const content = btn.nextElementSibling;
            content.classList.toggle('active');

            if (content.classList.contains('active')) {
                btn.innerHTML = 'Ocultar Solução <i class="ph-bold ph-eye-slash"></i>';
                btn.classList.add('bg-cyan-600', 'border-cyan-500');
                btn.classList.remove('bg-slate-700', 'border-slate-500');
            } else {
                btn.innerHTML = 'Revelar Solução <i class="ph-bold ph-eye"></i>';
                btn.classList.remove('bg-cyan-600', 'border-cyan-500');
                btn.classList.add('bg-slate-700', 'border-slate-500');
            }
        };

        function updateControls() {
            btnPrev.disabled = currentSlide === 0;
            btnNext.disabled = currentSlide === slidesData.length - 1;

            dotsContainer.innerHTML = '';
            slidesData.forEach((_, index) => {
                const dot = document.createElement('button');
                dot.className = `h-2 rounded-full transition-all duration-300 ${index === currentSlide ? 'w-8 bg-cyan-400' : 'w-2 bg-slate-600 hover:bg-slate-500'}`;
                dot.onclick = () => {
                    currentSlide = index;
                    renderSlide();
                };
                dotsContainer.appendChild(dot);
            });
        }

        btnPrev.addEventListener('click', () => {
            if (currentSlide > 0) {
                currentSlide--;
                renderSlide();
            }
        });

        btnNext.addEventListener('click', () => {
            if (currentSlide < slidesData.length - 1) {
                currentSlide++;
                renderSlide();
            }
        });

        // Keyboard navigation
        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') {
                if (currentSlide < slidesData.length - 1) { currentSlide++; renderSlide(); }
            } else if (e.key === 'ArrowLeft') {
                if (currentSlide > 0) { currentSlide--; renderSlide(); }
            }
        });

        // Inicia a aplicação
        renderSlide();
    </script>
</body>

</html>
