    <style>
        body {

        .glass {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(16px);

            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

            background: transparent;
        }

            background-color: #334155;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background-color: #475569;
        }

        .slide-enter {
            animation: slideIn 0.4s ease-out forwards;
        }

            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .reveal-content {
            max-height: 0;

        }

        .reveal-content.active {
            max-height: 500px;
            opacity: 1;
            padding-top: 1rem;
            padding-bottom: 1rem;
        }

        /* --- Regras de Exportação para PDF --- */
        @media print {
            body { background: #ffffff !important; color: #000000 !important; }
            /* Esconde a SPA interativa (header, main, footer) */
            header, main, footer, button { display: none !important; }
            
            /* Exibe APENAS a apostila de impressão */
            #print-container { display: block !important; }
            .print-slide { page-break-inside: avoid; margin-bottom: 3rem; padding-bottom: 2rem; border-bottom: 1px solid #e2e8f0; }
            .print-title { font-size: 1.5rem; font-weight: bold; margin-bottom: 1rem; color: #0f172a; border-bottom: 2px solid #059669; display: inline-block; padding-bottom: 0.2rem; }

            .print-challenge { margin-top: 1.5rem; padding: 1rem; background-color: #f8fafc; border: 1px solid #cbd5e1; border-radius: 0.5rem; }
            
            /* Forçar cores das tabelas e destaques no PDF */
            .text-emerald-400 { color: #059669 !important; font-weight: bold; }
            .text-red-400 { color: #dc2626 !important; font-weight: bold; }
            table { border-collapse: collapse; width: 100%; margin-top: 1rem; margin-bottom: 1rem; }
            th, td { border: 1px solid #cbd5e1 !important; padding: 0.5rem !important; text-align: left !important; color: #0f172a !important; }
            th { background-color: #f1f5f9 !important; font-weight: bold !important; }

</head>

                slideDiv.className = 'print-slide';
                
                slideDiv.innerHTML = `
                    <div class="print-title">${slide.title}</div>
                    <div class="print-content">${slide.content}</div>
                    <div class="print-challenge">
                        <strong>Desafio:</strong> ${slide.challenge}<br><br>
                        <strong>Solução:</strong> ${slide.solution}
                    </div>
                `;
                printContainer.appendChild(slideDiv);
            });

            document.body.appendChild(printContainer);
        }

        let currentSlide = 0;
        const container = document.getElementById('slide-container');
        const dotsContainer = document.getElementById('dots-container');
        const btnPrev = document.getElementById('btn-prev');
        const btnNext = document.getElementById('btn-next');

        function renderSlide() {
            const slide = slidesData[currentSlide];

            // Injeta o HTML do slide
            container.innerHTML = `
                <div class="glass rounded-2xl p-8 border-t-4 border-t-cyan-500 slide-enter w-full shadow-lg">
                    <h2 class="text-3xl font-bold mb-6 flex items-center gap-3 text-white">
                        <i class="ph-bold ${slide.icon} ${slide.color}"></i>
                        ${slide.title}
                    </h2>
                    
                    <div class="mb-8">
                        ${slide.content}
                    </div>

                    <div class="mt-8 border-t border-slate-700 pt-6">
                        <div class="bg-slate-800/50 border border-slate-600 rounded-xl p-5 relative overflow-hidden">
                            <div class="absolute top-0 left-0 w-1 h-full bg-amber-500"></div>
                            <h3 class="text-amber-400 font-bold text-sm uppercase tracking-wider mb-2 flex items-center gap-2">
                                <i class="ph-bold ph-lightning"></i> Desafio Rápido (Active Recall)
                            </h3>
                            <p class="text-slate-300 font-medium mb-4">${slide.challenge}</p>
                            
                            <button onclick="toggleSolution(this)" class="bg-slate-700 hover:bg-slate-600 text-white border border-slate-500 font-semibold px-4 py-2 rounded-lg transition flex items-center gap-2 text-sm">
                                Revelar Solução <i class="ph-bold ph-eye"></i>
                            </button>

                            <div class="reveal-content mt-0 bg-slate-900/80 rounded-lg px-4 border border-slate-700/50">
                                <p class="text-emerald-400 font-medium text-sm leading-relaxed"><i class="ph-bold ph-check-circle mr-1"></i> ${slide.solution}</p>
                            </div>
                        </div>
                    </div>
                </div>
            `;

            updateControls();
        }

        // Função global para o botão de Revelar Solução
        window.toggleSolution = function (btn) {
            const content = btn.nextElementSibling;
            content.classList.toggle('active');

            if (content.classList.contains('active')) {
                btn.innerHTML = 'Ocultar Solução <i class="ph-bold ph-eye-slash"></i>';
                btn.classList.add('bg-cyan-600', 'border-cyan-500');
                btn.classList.remove('bg-slate-700', 'border-slate-500');
            } else {
                btn.innerHTML = 'Revelar Solução <i class="ph-bold ph-eye"></i>';
                btn.classList.remove('bg-cyan-600', 'border-cyan-500');
                btn.classList.add('bg-slate-700', 'border-slate-500');
            }
        };

        function updateControls() {
            btnPrev.disabled = currentSlide === 0;
            btnNext.disabled = currentSlide === slidesData.length - 1;

            dotsContainer.innerHTML = '';
            slidesData.forEach((_, index) => {
                const dot = document.createElement('button');
                dot.className = `h-2 rounded-full transition-all duration-300 ${index === currentSlide ? 'w-8 bg-cyan-400' : 'w-2 bg-slate-600 hover:bg-slate-500'}`;
                dot.onclick = () => {
                    currentSlide = index;
                    renderSlide();
                };
                dotsContainer.appendChild(dot);
            });
        }

        btnPrev.addEventListener('click', () => {
            if (currentSlide > 0) {
                currentSlide--;
                renderSlide();
            }
        });

        btnNext.addEventListener('click', () => {
            if (currentSlide < slidesData.length - 1) {
                currentSlide++;
                renderSlide();
            }
        });

        // Keyboard navigation
        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') {
                if (currentSlide < slidesData.length - 1) { currentSlide++; renderSlide(); }
            } else if (e.key === 'ArrowLeft') {
                if (currentSlide > 0) { currentSlide--; renderSlide(); }
            }
        });

        // Inicia a aplicação
        renderSlide();
        
        // Gera o container oculto de impressão
        preparePrintContainer();
    </script>
</body>

</html>
