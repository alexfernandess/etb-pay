    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            dark: '#0f172a',    
                            panel: 'rgba(30, 41, 59, 0.6)', 
                            border: 'rgba(51, 65, 85, 0.5)', 
                        }
                    },
                    animation: {
                        'slide-down': 'slideDown 0.4s ease-out forwards',
                        'fade-in': 'fadeIn 0.3s ease-out forwards',
                    },
                    keyframes: {
                        slideDown: {
                            '0%': { opacity: '0', transform: 'translateY(-10px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        },
                        fadeIn: {
                            '0%': { opacity: '0' },
                            '100%': { opacity: '1' },
                        }
                    }
                }
            }
        }
    </script>

    <style>
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background-color: #334155; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background-color: #475569; }

        body {
            background-color: #0f172a;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(16, 185, 129, 0.05), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(245, 158, 11, 0.05), transparent 25%);
            background-attachment: fixed;
        }

        .glass-panel {
            background: var(--tw-colors-brand-panel);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--tw-colors-brand-border);
        }

        /* Estilos específicos para a geração do PDF (A Prova de Falhas) */
        
        .pdf-header { border-bottom: 3px solid #10b981; padding-bottom: 20px; margin-bottom: 30px; text-align: center; }
        .pdf-title { font-size: 28px; font-weight: 900; color: #0f172a; margin-bottom: 10px;}
        .pdf-student-info { background: #f8fafc; border: 1px solid #e2e8f0; padding: 15px; border-radius: 8px; margin-bottom: 30px; display: flex; justify-content: space-between;}
        .pdf-score { text-align: center; margin-bottom: 30px; font-size: 18px; font-weight: bold; color: #334155; }
        .pdf-question { margin-bottom: 25px; page-break-inside: avoid; border: 1px solid #e2e8f0; border-left: 4px solid #10b981; padding: 15px; border-radius: 6px; background: #f8fafc;}

        .pdf-q-text { font-size: 13px; color: #334155; margin-bottom: 12px; font-style: italic;}
        .pdf-q-answer { font-size: 13px; color: #0f172a; background: #ecfdf5; padding: 10px; border-radius: 4px;}

</head>

        // 2. ESTADO DA APLICAÇÃO
        let currentExam = null;
        let score = { correct: 0, incorrect: 0 };
        let answeredQuestions = new Set();
        let studentData = { name: '', id: '' };

        // 3. SELETORES DOM
        const container = document.getElementById('questions-container');
        const scoreCorrectEl = document.getElementById('score-correct');
        const scoreIncorrectEl = document.getElementById('score-incorrect');
        const examLabel = document.getElementById('current-exam-label');
        const inputName = document.getElementById('student-name');
        const inputId = document.getElementById('student-id');
        const finishSection = document.getElementById('finish-section');

        // 4. FUNÇÃO: CARREGAR PROVA
        function loadExam(examKey) {
            // Validação de Identificação
            const sName = inputName.value.trim();
            const sId = inputId.value.trim();

            if (sName === '' || sId === '') {
                alert('Acesso Negado: Preencha seu Nome e Matrícula para gerar o caderno de prova.');
                inputName.focus();
                return;
            }

            // Trava os inputs
            studentData = { name: sName, id: sId };
            inputName.disabled = true;
            inputId.disabled = true;
            inputName.classList.add('opacity-50', 'cursor-not-allowed');
            inputId.classList.add('opacity-50', 'cursor-not-allowed');

            let examDisciplina = examKey === 'java' ? "Java Back-End" : "Banco de Dados";
            let filteredQuestions = bancoQuestoes.filter(q => q.disciplina === examDisciplina);

                turma: examKey === 'java' ? "3G" : "2G",
                cargo: examKey === 'java' ? "Engenheiro de Software" : "Engenheiro de Dados",
                questions: filteredQuestions
            };
            
            // Resetar estado
            score = { correct: 0, incorrect: 0 };
            answeredQuestions.clear();
            updateScoreDisplay();
            finishSection.classList.add('hidden');
            
            // Atualizar Label
            examLabel.textContent = `Simulado: ${currentExam.disciplina}`;
            
            // Renderizar Questões
            container.innerHTML = '';
            
            currentExam.questions.forEach((q, index) => {
                const cardHTML = `

                        <!-- Cabeçalho da Questão -->

                            <label class="flex-1 cursor-pointer relative group">
                                <input type="radio" name="opt_${q.id}" value="Certo" class="peer sr-only">
                                <div class="p-4 rounded-xl border-2 border-slate-600/50 bg-slate-900/50 text-center text-slate-400 font-bold transition-all duration-200 
                                            group-hover:border-amber-500/50 group-hover:text-amber-400
                                            peer-checked:border-amber-500 peer-checked:bg-amber-500/10 peer-checked:text-amber-500">

        // 5. FUNÇÃO: RESPONDER QUESTÃO
        function responder(questionId, gabaritoCorreto) {
            if (answeredQuestions.has(questionId)) return;

            const selectedOpt = document.querySelector(`input[name="opt_${questionId}"]:checked`);
            
            if (!selectedOpt) {
                const btn = document.getElementById(`btn-${questionId}`);
                btn.classList.add('animate-pulse');
                setTimeout(() => btn.classList.remove('animate-pulse'), 500);
                return;
            }

            const valSelecionado = selectedOpt.value;
            const isCorrect = (valSelecionado === gabaritoCorreto);
            
            // Travar resposta
            answeredQuestions.add(questionId);
            document.querySelectorAll(`input[name="opt_${questionId}"]`).forEach(radio => {
                radio.disabled = true;
                radio.parentElement.classList.remove('cursor-pointer', 'group'); 
            });

            // Atualizar Placar
            if (isCorrect) score.correct++;
            else score.incorrect++;
            updateScoreDisplay();

            // Transformar botão responder em check verde
            const btn = document.getElementById(`btn-${questionId}`);
            btn.innerHTML = 'Respondido <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>';
            btn.className = "w-full sm:w-auto px-8 py-3.5 bg-emerald-500/20 text-emerald-400 font-black rounded-xl border border-emerald-500/50 flex items-center justify-center gap-2 uppercase tracking-wide cursor-default";
            btn.disabled = true;

            // Feedback UI
            const feedbackContainer = document.getElementById(`feedback-${questionId}`);
            const questionData = currentExam.questions.find(q => q.id === questionId);
            
            let feedbackSelo, bgClass, borderClass, textClass;

            if (isCorrect) {
                feedbackSelo = `<div class="flex items-center gap-2 font-black text-lg text-emerald-400 mb-2 uppercase tracking-wide"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg> Você Acertou!</div>`;
                bgClass = 'bg-emerald-500/10';
                borderClass = 'border-emerald-500/50';
                textClass = 'text-emerald-100';
            } else {
                feedbackSelo = `<div class="flex items-center gap-2 font-black text-lg text-rose-400 mb-2 uppercase tracking-wide"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg> Você Errou!</div>`;
                bgClass = 'bg-rose-500/10';
                borderClass = 'border-rose-500/50';
                textClass = 'text-rose-100';
            }

            const gabaritoText = gabaritoCorreto.toUpperCase();

            feedbackContainer.innerHTML = `
                <div class="p-5 rounded-xl border ${borderClass} ${bgClass} animate-slide-down">
                    ${feedbackSelo}
                    <div class="mt-4">
                        <span class="text-xs font-bold uppercase tracking-wider text-slate-400">Gabarito Oficial: <strong class="text-white">${gabaritoText}</strong></span>
                        <div class="mt-3 text-sm md:text-base ${textClass} leading-relaxed">
                            ${questionData.comentario}
                        </div>
                    </div>
                </div>
            `;
            
            feedbackContainer.classList.remove('hidden');

            // Verifica se terminou o exame para mostrar o botão de PDF
            if (answeredQuestions.size === currentExam.questions.length) {
                finishSection.classList.remove('hidden');
                finishSection.classList.add('animate-slide-down');
                // Scroll para o botão
                setTimeout(() => finishSection.scrollIntoView({ behavior: 'smooth' }), 500);
            }
        }

        // 6. FUNÇÃO AUXILIAR: ATUALIZAR PLACAR
        function updateScoreDisplay() {
            scoreCorrectEl.textContent = score.correct;
            scoreIncorrectEl.textContent = score.incorrect;
            
            let total = score.correct + score.incorrect;
            let rendimento = total === 0 ? 0 : Math.round((score.correct / total) * 100);
            document.getElementById('score-yield').textContent = rendimento + '%';
            
            scoreCorrectEl.parentElement.classList.add('scale-110', 'transition-transform');
            setTimeout(() => scoreCorrectEl.parentElement.classList.remove('scale-110'), 200);
        }

        // 7. GERAÇÃO DE PDF DE RESOLUÇÃO (BLINDADA CONTRA FALHAS DE RENDERIZAÇÃO)
        function generatePDF() {
            const btn = document.querySelector('#finish-section button');
            const originalHTML = btn.innerHTML;
            btn.innerHTML = '<svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-slate-900" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> Renderizando Documento...';
            btn.style.pointerEvents = 'none';

            // Obter a data e hora atual
            const dataAtual = new Date();
            const dataFormatada = dataAtual.toLocaleDateString('pt-BR');
            const horaFormatada = dataAtual.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });

            // Construir o conteúdo HTML do PDF
            let htmlContent = `
                <div style="width: 100%; max-width: 800px; margin: 0 auto; background: #ffffff; color: #0f172a; padding: 40px; font-family: 'Inter', sans-serif; box-sizing: border-box;">
                    <div class="pdf-header" style="border-bottom: 3px solid #10b981; padding-bottom: 20px; margin-bottom: 30px; text-align: center;">
                        <div class="pdf-title" style="font-size: 24px; font-weight: 900; color: #0f172a; margin-bottom: 15px;">ETB - Escola Técnica de Brasília</div>
                        <div style="color: #64748b; font-size: 14px; margin-bottom: 5px;"><strong>Disciplina:</strong> ${currentExam.disciplina}</div>
                        <div style="color: #64748b; font-size: 14px; margin-bottom: 5px;"><strong>Turma:</strong> ${currentExam.turma}</div>
                        <div style="color: #64748b; font-size: 14px;"><strong>Data e hora:</strong> ${dataFormatada} às ${horaFormatada}</div>
                    </div>
                    <div class="pdf-student-info" style="background: #f8fafc; border: 1px solid #e2e8f0; padding: 15px; border-radius: 8px; margin-bottom: 30px; display: flex; justify-content: space-between;">
                        <div>
                            <div style="font-size: 12px; color: #64748b; text-transform: uppercase; font-weight: bold; margin-bottom: 4px;">Engenheiro(a) Avaliado(a)</div>

                        </div>
                        <div style="text-align: right;">
                            <div style="font-size: 12px; color: #64748b; text-transform: uppercase; font-weight: bold; margin-bottom: 4px;">Matrícula</div>
                            <div style="font-size: 18px; font-weight: 700; color: #0f172a;">${studentData.id}</div>
                        </div>
                    </div>
                    <div class="pdf-score" style="text-align: center; margin-bottom: 30px; font-size: 18px; font-weight: bold; color: #334155;">
                        <span style="color: #10b981;">Acertos: ${score.correct}</span> &nbsp;|&nbsp; <span style="color: #ef4444;">Erros: ${score.incorrect}</span>
                    </div>
            `;

            currentExam.questions.forEach((q, i) => {
                const selectedVal = document.querySelector(`input[name="opt_${q.id}"]:checked`).value;
                const statusColor = selectedVal === q.gabarito ? '#10b981' : '#ef4444';
                const statusText = selectedVal === q.gabarito ? 'ACERTOU' : 'ERROU';
                
                htmlContent += `
                    <div class="pdf-question" style="margin-bottom: 25px; page-break-inside: avoid; border: 1px solid #e2e8f0; border-left: 4px solid #10b981; padding: 15px; border-radius: 6px; background: #f8fafc;">
                        <div class="pdf-q-title" style="font-weight: 700; color: #0f172a; margin-bottom: 8px; font-size: 14px;">Questão ${i + 1} - ${q.assunto}</div>
                        <div class="pdf-q-text" style="font-size: 13px; color: #334155; margin-bottom: 12px; font-style: italic;">"${q.enunciado}"</div>
                        <div style="margin-bottom: 10px; font-size: 13px;">
                            <strong>Sua Resposta:</strong> ${selectedVal.toUpperCase()} 
                            <span style="color: ${statusColor}; font-weight: bold; margin-left: 10px;">[${statusText}]</span>
                        </div>
                        <div class="pdf-q-answer" style="font-size: 13px; color: #0f172a; background: #ecfdf5; padding: 10px; border-radius: 4px;">
                            <strong style="color: #059669;">Gabarito Oficial (${q.gabarito}):</strong> ${q.comentario}
                        </div>
                    </div>
                `;
            });
            
            htmlContent += `</div>`; // Fechar a div principal

            // Opções do html2pdf
            const opt = {
                margin:       10,
                filename:     `ETB_Avaliacao_${studentData.id}.pdf`,
                image:        { type: 'jpeg', quality: 0.98 },
                html2canvas:  { scale: 2, useCORS: true, scrollY: 0, scrollX: 0 },
                jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };

            // Delay de 500ms vital para garantir que o navegador "pintou" a div escondida na memória antes de fotografar
            setTimeout(() => {
                html2pdf().set(opt).from(htmlContent).save().then(() => {
                    btn.innerHTML = originalHTML;
                    btn.style.pointerEvents = 'auto';
                }).catch(err => {
                    console.error("Erro na geração do PDF:", err);
                    alert("Ocorreu um erro ao gerar o PDF. Verifique o console.");
                    btn.innerHTML = originalHTML;
                    btn.style.pointerEvents = 'auto';
                });
            }, 500);
        }

    </script>
</body>
</html>
