                                    <strong>O que faz:</strong> Obriga o banco a trazer TUDO o que existe na Tabela A (Esquerda), mesmo que não tenha correspondência na Tabela B. Onde não há par, ele preenche com <code>NULL</code>.<br>
                                    <strong>Uso Tático:</strong> Ideal para descobrir <em>taxa de abandono</em>. Ex: Quantos usuários fizeram cadastro (Tabela Clientes), mas não chegaram a abrir a conta (Tabela Contas = NULL)?

                                    <span class="transition group-open:rotate-180 text-purple-500"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg></span>

                                    <strong>Uso Tático:</strong> Auditoria de Fraude. Ex: Existem Contas geradas no sistema movimentando dinheiro, mas que o Nome do Cliente está <code>NULL</code>? Achamos um registro órfão ou fraude!

            },
            {

                content: `

                        <h3 class="text-2xl font-bold text-purple-600 dark:text-purple-400">Construindo um INNER JOIN</h3>

                answer: `
                    <div class="space-y-3">
                        <p class="text-slate-700 dark:text-slate-300">Utilizamos um <code>SELECT</code> (da categoria DQL) associado ao <code>INNER JOIN</code> para cruzar os dados da FK <code>id_cliente</code> com a PK <code>id</code> do cliente.</p>
                        <div class="bg-slate-900 rounded-xl p-4 overflow-x-auto text-sm text-cyan-400 font-mono shadow-inner border border-slate-700 mt-2">
<pre>SELECT 
    tb_clientes.nome, 
    tb_contas.agencia
FROM tb_clientes
INNER JOIN tb_contas 
    ON tb_clientes.id = tb_contas.id_cliente;</pre>
                        </div>
                    </div>`
            },
            {
                title: "Teoria: A Regra CASCADE",
                icon: icons.strategy,
                isQuestion: false,
                content: `
                    <div class="flex flex-col h-full justify-center space-y-6">
                        <div class="p-6 rounded-2xl border-l-4 border-emerald-500 bg-emerald-50 dark:bg-emerald-500/10">
                            <h3 class="text-2xl font-bold mb-2 text-emerald-700 dark:text-emerald-400">Integridade Referencial e CASCADE</h3>
                            <p class="text-lg text-slate-700 dark:text-slate-300">
                                A <strong>Integridade Referencial</strong> é a regra que garante que um registro filho (ex: uma conta) não possa apontar para um pai inexistente (ex: um cliente deletado).
                            </p>
                        </div>
                        <div class="space-y-4">
                            <p class="text-slate-600 dark:text-slate-400 leading-relaxed text-lg">
                                O comportamento padrão de muitos bancos ao tentar deletar um registro "pai" que possui registros "filhos" é bloquear a exclusão (RESTRICT).
                            </p>
                            <p class="text-slate-600 dark:text-slate-400 leading-relaxed text-lg">
                                No entanto, se configurarmos a Chave Estrangeira (FK) com <strong>ON DELETE CASCADE</strong>, o banco de dados deletará automaticamente todos os registros filhos dependentes caso o pai seja deletado. Isso evita a permanência de registros órfãos no banco de dados.
                            </p>
                        </div>
                    </div>`
            },

                        <p class="text-slate-700 dark:text-slate-300"><strong>Gabarito Técnico:</strong> Um registro órfão é aquele que aponta (via Chave Estrangeira) para uma Chave Primária que não existe mais. Se o banco permitir a exclusão do registro pai sem uma política de <code>CASCADE</code> (que deletaria os filhos em cascata) ou <code>RESTRICT</code> (que bloquearia a exclusão do pai), a integridade referencial seria quebrada e os filhos se tornariam órfãos.</p>

            {

                icon: icons.exam,
                isQuestion: false,
                content: `

                            <li class="flex items-center gap-3 text-slate-600 dark:text-slate-300 font-medium bg-slate-100 dark:bg-slate-800/50 p-3 rounded-lg border border-slate-200 dark:border-slate-700"><i class="ph-fill ph-check-circle text-emerald-500 text-xl"></i> Álgebra Relacional: INNER JOIN</li>
                            <li class="flex items-center gap-3 text-slate-600 dark:text-slate-300 font-medium bg-slate-100 dark:bg-slate-800/50 p-3 rounded-lg border border-slate-200 dark:border-slate-700"><i class="ph-fill ph-check-circle text-emerald-500 text-xl"></i> Integridade Referencial e Comportamento CASCADE</li>

            }
        ];

        let currentSlide = 0;
        let isDarkMode = true;
        let currentFontSizeLevel = 0; // -1, 0, 1

        function changeFontSize(level) {
            currentFontSizeLevel = level;
            localStorage.setItem('fontSizeLevel', level);

            const root = document.documentElement;
            const btnDec = document.getElementById('font-btn-dec');
            const btnNorm = document.getElementById('font-btn-norm');
            const btnInc = document.getElementById('font-btn-inc');

            if (!btnDec || !btnNorm || !btnInc) return;

            // Reset classes
            btnDec.className = "px-2.5 py-1 text-xs font-bold text-slate-500 hover:text-slate-800 dark:text-slate-400 dark:hover:text-white transition-colors";
            btnNorm.className = "px-2.5 py-1 text-xs font-bold text-slate-500 hover:text-slate-800 dark:text-slate-400 dark:hover:text-white border-l border-r border-slate-300 dark:border-slate-600 transition-colors";
            btnInc.className = "px-2.5 py-1 text-xs font-bold text-slate-500 hover:text-slate-800 dark:text-slate-400 dark:hover:text-white transition-colors";

            if (level === -1) {
                root.style.fontSize = '14px';
                btnDec.className = "px-2.5 py-1 text-xs font-bold text-cyan-600 dark:text-cyan-400 transition-colors";
            } else if (level === 1) {
                root.style.fontSize = '18px';
                btnInc.className = "px-2.5 py-1 text-xs font-bold text-cyan-600 dark:text-cyan-400 transition-colors";
            } else {
                root.style.fontSize = '16px';
                btnNorm.className = "px-2.5 py-1 text-xs font-bold text-cyan-600 dark:text-cyan-400 border-l border-r border-slate-300 dark:border-slate-600 transition-colors";
            }
        }

        const DOM = {
            html: document.documentElement,
            themeToggle: document.getElementById('theme-toggle'),
            themeIcon: document.getElementById('theme-icon'),
            slideCounter: document.getElementById('slide-counter'),
            progressBar: document.getElementById('progress-bar'),
            iconContainer: document.getElementById('slide-icon-container'),
            title: document.getElementById('slide-title'),
            contentContainer: document.getElementById('slide-content-container'),
            answerSection: document.getElementById('answer-section'),
            btnReveal: document.getElementById('btn-reveal'),
            answerFeedback: document.getElementById('answer-feedback'),
            answerText: document.getElementById('answer-text'),
            btnPrev: document.getElementById('btn-prev'),
            btnNext: document.getElementById('btn-next'),
            dotsContainer: document.getElementById('dots-container'),
            sidebarNav: document.getElementById('sidebar-nav')
        };

        function updateTheme() {
            if (isDarkMode) {
                DOM.html.classList.add('dark');
                DOM.themeIcon.innerHTML = icons.sun;
            } else {
                DOM.html.classList.remove('dark');
                DOM.themeIcon.innerHTML = icons.moon;
            }
        }

        DOM.themeToggle.addEventListener('click', () => {
            isDarkMode = !isDarkMode;
            updateTheme();
        });

        // --- CONTROLE DA SIDEBAR E MARGEM NEGATIVA ---
        const sidebar = document.getElementById('sidebar');
        const sidebarToggle = document.getElementById('sidebar-toggle');
        const sidebarOverlay = document.getElementById('sidebar-overlay');
        let isSidebarOpen = window.innerWidth >= 768;

        function updateSidebarState() {
            if (isSidebarOpen) {
                sidebar.classList.remove('-translate-x-full', 'md:-ml-72');
                sidebarOverlay.classList.remove('hidden');
            } else {
                sidebar.classList.add('-translate-x-full', 'md:-ml-72');
                sidebarOverlay.classList.add('hidden');
            }
        }

        sidebarToggle.addEventListener('click', () => {
            isSidebarOpen = !isSidebarOpen;
            updateSidebarState();
        });

        sidebarOverlay.addEventListener('click', () => {
            if (window.innerWidth < 768) {
                isSidebarOpen = false;
                updateSidebarState();
            }
        });

        function populateSidebar() {
            DOM.sidebarNav.innerHTML = '';
            slidesData.forEach((slide, index) => {
                const li = document.createElement('li');
                li.className = `p-3 rounded-lg cursor-pointer transition-all border-l-4 text-sm font-medium ${index === currentSlide
                    ? 'bg-cyan-50 dark:bg-cyan-900/20 border-cyan-500 text-cyan-700 dark:text-cyan-400'
                    : 'border-transparent text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800'
                    }`;
                li.innerHTML = `<div class="flex items-center gap-3">
                                   <div class="scale-75 opacity-70">${slide.icon}</div>
                                   <span class="truncate">${slide.title}</span>
                                </div>`;
                li.addEventListener('click', () => {
                    currentSlide = index;
                    renderSlide();
                    if (window.innerWidth < 768) {
                        isSidebarOpen = false;
                        updateSidebarState();
                    }
                });
                DOM.sidebarNav.appendChild(li);
            });
        }

        function renderSlide() {
            const slide = slidesData[currentSlide];

            DOM.contentContainer.classList.remove('slide-transition');
            void DOM.contentContainer.offsetWidth;
            DOM.contentContainer.classList.add('slide-transition');

            DOM.iconContainer.innerHTML = slide.icon;
            DOM.title.textContent = slide.title;
            DOM.contentContainer.innerHTML = slide.content;

            const progress = ((currentSlide + 1) / slidesData.length) * 100;
            DOM.progressBar.style.width = `${progress}%`;
            DOM.slideCounter.textContent = `SLIDE ${currentSlide + 1} / ${slidesData.length}`;

            if (slide.isQuestion) {
                DOM.answerSection.classList.remove('hidden');
                DOM.btnReveal.classList.remove('hidden');
                DOM.answerFeedback.classList.add('hidden');

                DOM.answerText.innerHTML = slide.answer;

                DOM.btnReveal.innerHTML = `
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="mr-1">
                        <polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/>
                    </svg> Revelar Solução`;
            } else {
                DOM.answerSection.classList.add('hidden');
            }

            DOM.btnPrev.disabled = currentSlide === 0;
            DOM.btnPrev.style.opacity = currentSlide === 0 ? '0.3' : '1';
            DOM.btnNext.disabled = currentSlide === slidesData.length - 1;
            DOM.btnNext.style.opacity = currentSlide === slidesData.length - 1 ? '0.3' : '1';

            updateDots();
            populateSidebar();
        }

        DOM.btnReveal.addEventListener('click', () => {
            if (DOM.answerFeedback.classList.contains('hidden')) {
                DOM.answerFeedback.classList.remove('hidden');
                DOM.btnReveal.innerHTML = `
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="mr-1">
                        <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>
                    </svg> Ocultar Solução`;
            } else {
                DOM.answerFeedback.classList.add('hidden');
                DOM.btnReveal.innerHTML = `
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="mr-1">
                        <polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/>
                    </svg> Revelar Solução`;
            }
        });

        function nextSlide() {
            if (currentSlide < slidesData.length - 1) {
                currentSlide++;
                renderSlide();
            }
        }

        function prevSlide() {
            if (currentSlide > 0) {
                currentSlide--;
                renderSlide();
            }
        }

        DOM.btnNext.addEventListener('click', nextSlide);
        DOM.btnPrev.addEventListener('click', prevSlide);

        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight' || e.key === ' ') nextSlide();
            if (e.key === 'ArrowLeft') prevSlide();
        });

        function createDots() {
            DOM.dotsContainer.innerHTML = '';
            slidesData.forEach((_, index) => {
                const dot = document.createElement('div');
                dot.className = `h-2 rounded-full cursor-pointer transition-all ${index === currentSlide ? 'bg-cyan-500 w-8' : 'bg-slate-300 dark:bg-slate-700 w-2'}`;
                dot.addEventListener('click', () => {
                    currentSlide = index;
                    renderSlide();
                });
                DOM.dotsContainer.appendChild(dot);
            });
        }

        function updateDots() {
            const dots = DOM.dotsContainer.children;
            Array.from(dots).forEach((dot, index) => {
                dot.className = `h-2 rounded-full cursor-pointer transition-all ${index === currentSlide ? 'bg-cyan-500 w-8' : 'bg-slate-300 dark:bg-slate-700 w-2'}`;
            });
        }

        // Inicialização
        if (localStorage.getItem('fontSizeLevel')) {
            currentFontSizeLevel = parseInt(localStorage.getItem('fontSizeLevel'));
        }
        changeFontSize(currentFontSizeLevel);

        updateTheme();
        updateSidebarState();
        createDots();
        renderSlide();
    </script>
</body>
