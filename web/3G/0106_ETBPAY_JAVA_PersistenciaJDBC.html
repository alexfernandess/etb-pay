<pre>private void cadastrarCliente() {
    Cliente cliente = new Cliente();
    cliente.setNome(txtNome.getText());

    // HIGIENIZAÇÃO CRÍTICA (Regex)

    String telLimpo = txtTelefone.getText().replaceAll("[^\\d]", "");
    cliente.setTelefone(telLimpo);

    ClienteDAO dao = new ClienteDAO();
    if(dao.inserir(cliente)) {
        System.out.println("Sucesso: Cliente salvo!");

        System.out.println("Erro: Falha ao salvar no banco.");
    }

                answer: `
                    <div class="code-container w-full">
<pre>public boolean inserir(Cliente c) {
    String sql = "INSERT INTO tb_clientes (cpf, nome, email, telefone) VALUES (?, ?, ?, ?)";
    try (Connection conn = ConexaoDB.conectar();
         PreparedStatement stmt = conn.prepareStatement(sql)) {
        
        stmt.setString(1, c.getCpf());
        stmt.setString(2, c.getNome());
        stmt.setString(3, c.getEmail());
        stmt.setString(4, c.getTelefone());
        
        stmt.executeUpdate();
        return true;
    } catch (SQLException e) {
        System.err.println("Erro DAO: " + e.getMessage());
        return false;
    }
}</pre>

        let currentSlide = 0; let isDarkMode = true;

            btnNext: document.getElementById('btn-next'), sidebarNav: document.getElementById('sidebar-nav')

        // Lógica Global de Download SQL
        window.downloadSQL = function () {
            const sqlContent = "DROP TABLE IF EXISTS tb_clientes;\n\nCREATE TABLE tb_clientes (\n    id_cliente INTEGER PRIMARY KEY AUTOINCREMENT,\n    cpf TEXT UNIQUE NOT NULL,\n    nome TEXT NOT NULL,\n    email TEXT,\n    telefone TEXT CHECK (telefone IS NULL OR GLOB('*[0-9]*', telefone))\n);";
            const blob = new Blob([sqlContent], { type: 'text/plain' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'tb_clientes.sql';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            window.URL.revokeObjectURL(url);
        };

        function updateTheme() {
            if (isDarkMode) { DOM.html.classList.add('dark'); DOM.themeIcon.innerHTML = icons.sun; }
            else { DOM.html.classList.remove('dark'); DOM.themeIcon.innerHTML = icons.moon; }

        let isSidebarOpen = window.innerWidth >= 768;
        function updateSidebarState() {
            if (isSidebarOpen) { DOM.sidebar.classList.remove('-translate-x-full', 'md:-ml-72'); DOM.sidebarOverlay.classList.remove('hidden'); }
            else { DOM.sidebar.classList.add('-translate-x-full', 'md:-ml-72'); DOM.sidebarOverlay.classList.add('hidden'); }
        }

        DOM.sidebarToggle.addEventListener('click', () => { isSidebarOpen = !isSidebarOpen; updateSidebarState(); });
        DOM.themeToggle.addEventListener('click', () => { isDarkMode = !isDarkMode; updateTheme(); });

        function populateSidebar() {
            DOM.sidebarNav.innerHTML = '';
            slidesData.forEach((slide, index) => {
                const li = document.createElement('li');
                li.className = `p-3 rounded-lg cursor-pointer transition-all border-l-4 text-xs font-medium ${index === currentSlide
                        ? 'bg-cyan-50 dark:bg-cyan-900/20 border-cyan-500 text-cyan-700 dark:text-cyan-400 font-bold shadow-sm'

                                   <span class="truncate">${slide.sidebarTitle || slide.title}</span>
                                </div>`;
                li.onclick = () => { currentSlide = index; renderSlide(); if (window.innerWidth < 768) { isSidebarOpen = false; updateSidebarState(); } };

        }

        function renderSlide() {
            const slide = slidesData[currentSlide];
            DOM.contentContainer.classList.remove('slide-transition'); void DOM.contentContainer.offsetWidth; DOM.contentContainer.classList.add('slide-transition');
            DOM.iconContainer.innerHTML = slide.icon; DOM.title.textContent = slide.title; DOM.contentContainer.innerHTML = slide.content;
            DOM.progressBar.style.width = `${((currentSlide + 1) / slidesData.length) * 100}%`;
            DOM.slideCounter.textContent = `SLIDE ${currentSlide + 1} / ${slidesData.length}`;

            if (slide.isQuestion) {
                DOM.answerSection.classList.remove('hidden');
                DOM.btnReveal.classList.remove('hidden');
                DOM.answerFeedback.classList.add('hidden');
                DOM.answerText.innerHTML = slide.answer;

                // Botão sempre reinicia com "Revelar Solução"
                DOM.btnReveal.innerHTML = `
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="mr-1">
                        <polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/>
                    </svg> Revelar Solução`;
            }
            else { DOM.answerSection.classList.add('hidden'); }

            DOM.btnPrev.disabled = currentSlide === 0; DOM.btnPrev.style.opacity = currentSlide === 0 ? '0.3' : '1';
            DOM.btnNext.disabled = currentSlide === slidesData.length - 1; DOM.btnNext.style.opacity = currentSlide === slidesData.length - 1 ? '0.3' : '1';
            populateSidebar();
        }

        // Lógica de Toggle Corrigida
        DOM.btnReveal.addEventListener('click', () => {
            if (DOM.answerFeedback.classList.contains('hidden')) {
                DOM.answerFeedback.classList.remove('hidden');
                DOM.btnReveal.innerHTML = `
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="mr-1">
                        <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>
                    </svg> Ocultar Solução`;
            }
            else {
                DOM.answerFeedback.classList.add('hidden');
                DOM.btnReveal.innerHTML = `
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="mr-1">
                        <polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/>
                    </svg> Revelar Solução`;
            }
        });

        DOM.btnNext.onclick = () => { if (currentSlide < slidesData.length - 1) { currentSlide++; renderSlide(); } };
        DOM.btnPrev.onclick = () => { if (currentSlide > 0) { currentSlide--; renderSlide(); } };
        window.onkeydown = (e) => { if (e.key === 'ArrowRight' || e.key === ' ') DOM.btnNext.onclick(); if (e.key === 'ArrowLeft') DOM.btnPrev.onclick(); };

        let currentFontSize = 16;
        document.getElementById('btn-font-plus').onclick = () => { if (currentFontSize < 24) { currentFontSize += 2; document.documentElement.style.fontSize = currentFontSize + 'px'; } };
        document.getElementById('btn-font-minus').onclick = () => { if (currentFontSize > 12) { currentFontSize -= 2; document.documentElement.style.fontSize = currentFontSize + 'px'; } };

        updateTheme(); updateSidebarState(); renderSlide();
    </script>
</body>

</html>
